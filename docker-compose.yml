services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      AUTH_DISABLED: "true"
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      POLARIS_RESULTS_DIR: /app/results
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - polaris_pg:/var/lib/postgresql/data

volumes:
  polaris_pg:
