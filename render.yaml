services:
  - type: web
    name: polaris-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polaris-db
          property: connectionString
      # Update CORS_ORIGINS in the Render dashboard after deploy to include your Vercel URL
      # e.g. add: ,https://your-app.vercel.app
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8081,http://127.0.0.1:8081
      - key: AUTH_DISABLED
        value: "true"
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: POLARIS_RESULTS_DIR
        value: /data/results

databases:
  - name: polaris-db
    databaseName: polaris
    user: polaris
    plan: free
