name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python init_db.py
      - run: pytest tests/ -q
      - run: ruff check app tests --ignore E501 || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t polaris-api:ci .

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python init_db.py
      - run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8080 &
          sleep 3
          curl -sf http://127.0.0.1:8080/api/v1/health | grep '"status":"ok"'
